name: Build AdGuardHome IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 准备环境
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget zstd
          
      - name: 下载 24.10.5 专属 SDK
        run: |
          wget https://downloads.immortalwrt.org/releases/24.10.5/targets/x86/64/immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar -xf *.tar.zst
          rm *.tar.zst  # <--- 加了这一行“过河拆桥”，先删压缩包
          mv immortalwrt-sdk-* sdk

      - name: 注入代码并安装依赖
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ln -s $GITHUB_WORKSPACE/luci-app-adguardhome package/luci-app-adguardhome

      - name: 开始闪电编译
        run: |
          cd sdk
          make defconfig
          echo "CONFIG_PACKAGE_luci-app-adguardhome=y" >> .config
          make package/luci-app-adguardhome/compile V=s

      - name: 打包上传成品
        uses: actions/upload-artifact@v4
        with:
          name: AdGuardHome-IPK-x86-24.10.5
          path: sdk/bin/packages/x86_64/base/*.ipk
